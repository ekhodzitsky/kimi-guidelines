name: 'kimi-dotfiles check'
description: 'Run cargo-kimi check, clippy, and tests with configurable strictness'
inputs:
  strictness:
    description: 'Strictness level: relaxed, standard, or strict'
    required: false
    default: 'standard'
  toolchain:
    description: 'Rust toolchain to use'
    required: false
    default: 'stable'
runs:
  using: 'composite'
  steps:
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: ${{ inputs.toolchain }}

    - name: Install cargo-kimi
      shell: bash
      run: cargo install cargo-kimi

    - name: Run cargo-kimi check
      shell: bash
      run: cargo kimi check --strictness ${{ inputs.strictness }}
