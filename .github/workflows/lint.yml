name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check directory structure
        run: |
          test -f AGENTS.md
          test -f README.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f install.sh
          test -d languages/rust
          test -d templates/rust/minimal
          test -d templates/rust/rust-only
          test -d templates/rust/full
          test -d templates/python
          test -d strictness
          test -f strictness/relaxed.toml
          test -f strictness/standard.toml
          test -f strictness/strict.toml
          test -d examples/rust-demo
          test -f examples/rust-demo/Cargo.toml

      - name: ShellCheck install.sh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck install.sh

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install cargo-kimi
        run: cargo install cargo-kimi

      - name: Run cargo-kimi check on rust-demo
        run: |
          cd examples/rust-demo
          cargo kimi check --strictness standard

      - name: Run cargo-kimi check on rust-http-client
        run: |
          cd examples/rust-http-client
          cargo kimi check --strictness standard

  rust-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Run cargo test
        run: |
          cd examples/rust-demo
          cargo test

      - name: Run cargo clippy
        run: |
          cd examples/rust-demo
          cargo clippy -- -D warnings

      - name: Run cargo doc
        run: |
          cd examples/rust-demo
          cargo doc --no-deps

  verify:
    runs-on: ubuntu-latest
    needs: [contracts, rust-demo]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Run Kani on rust-demo
        run: |
          cd examples/rust-demo
          cargo kani

      - name: Run Kani on rust-http-client
        run: |
          cd examples/rust-http-client
          cargo kani


