name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check directory structure
        run: |
          test -f AGENTS.md
          test -f README.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f install.sh
          test -f scripts/check-contracts.py
          test -d languages/rust
          test -d templates/minimal
          test -d templates/rust-only
          test -d templates/full
          test -d examples/rust-demo
          test -f examples/rust-demo/Cargo.toml

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run contract checker on demo
        run: python3 scripts/check-contracts.py examples/rust-demo/src/

      - name: Run contract checker on languages/rust
        run: python3 scripts/check-contracts.py languages/rust/

  rust-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Run cargo test
        run: |
          cd examples/rust-demo
          cargo test

      - name: Run cargo clippy
        run: |
          cd examples/rust-demo
          cargo clippy -- -D warnings

      - name: Run cargo doc
        run: |
          cd examples/rust-demo
          cargo doc --no-deps

  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Run Kani proofs
        run: |
          cd examples/rust-demo
          cargo kani
