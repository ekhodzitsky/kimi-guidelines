name: Release cargo-kimi

on:
  push:
    tags:
      - 'cargo-kimi-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: cargo-kimi
        run: cargo test

  build:
    name: Build Release Binary
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        working-directory: cargo-kimi
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.ext == ''
        run: |
          mkdir -p dist
          cp cargo-kimi/target/${{ matrix.target }}/release/cargo-kimi dist/cargo-kimi-${{ matrix.target }}
          chmod +x dist/cargo-kimi-${{ matrix.target }}

      - name: Package binary (Windows)
        if: matrix.ext == '.exe'
        run: |
          mkdir -p dist
          cp cargo-kimi/target/${{ matrix.target }}/release/cargo-kimi.exe dist/cargo-kimi-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cargo-kimi-${{ matrix.target }}
          path: dist/cargo-kimi-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

  publish-dry-run:
    name: Publish Dry Run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Dry-run crates.io publish
        working-directory: cargo-kimi
        run: cargo publish --dry-run --locked

  release:
    name: Create GitHub Release
    needs:
      - build
      - publish-dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cargo-kimi-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#cargo-kimi-v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: cargo-kimi ${{ steps.version.outputs.version }}
          files: dist/cargo-kimi-*
          generate_release_notes: true
